<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>充电桩管理</title>
    <link rel="stylesheet" href="styles/tailwind.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@6.5.95/css/materialdesignicons.min.css">
    <!-- 引入tailwindcss -->
    <!-- <script src="https://cdn.tailwindcss.com"></script> --> 
</head>
<body class="bg-gray-50">
    <div class="min-h-screen flex">
        <!-- 侧边栏 -->
        <div class="w-48 bg-white shadow-lg transition-all duration-300">
            <div class="p-4 border-b border-gray-200">
                <h1 class="text-xl font-bold text-gray-800">管理系统</h1>
            </div>
            <nav class="mt-4 px-2">
                <div class="space-y-2">
                    <a href="admin.html" class="sidebar-link block">
                        <span class="mdi mdi-home text-xl"></span>
                        <span class="ml-3">主页</span>
                    </a>
                    <a href="balance.html" class="sidebar-link block">
                        <span class="mdi mdi-wallet text-xl"></span>
                        <span class="ml-3">余额管理</span>
                    </a>
                    <a href="charging.html" class="sidebar-link block">
                        <span class="mdi mdi-battery-charging text-xl"></span>
                        <span class="ml-3">继电器管理</span>
                    </a>
                    <a href="Controlcentre.html" class="sidebar-link block">
                        <span class="mdi mdi-cog-transfer text-xl"></span>  <!-- 带齿轮的控制台图标 -->
                        <span class="ml-3">调控中心</span>
                    </a>
                    <a href="orders.html" class="sidebar-link block">
                        <span class="mdi mdi-cash-register text-xl"></span>
                        <span class="ml-3">订单管理</span>
                    </a>
                    <a href="phoneNumbersLog.html" class="sidebar-link block">
                        <span class="mdi mdi-file-document-outline text-xl"></span>
                        <span class="ml-3">日志</span>
                    </a>
                </div>
            </nav>
        </div>

        <!-- 主要内容区 -->
        <div class="flex-1 p-8">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-bold text-gray-800">充电桩管理</h2>
                <div class="flex items-center">
                    <span id="statusIcon" class="mdi mdi-wifi text-2xl mr-2 text-green-500"></span>
                    <span id="statusText" class="text-green-600">已连接</span>
                </div>
            </div>

            <!-- 站点ID选择区域 -->
            <div class="mb-6 bg-white p-4 rounded-lg shadow-md">
                <div class="flex items-center">
                    <div class="flex-1">
                        <label class="block text-lg font-medium text-gray-700 mb-2">站点ID</label>
                        <input type="text" id="stationIdInput" class="input w-full" placeholder="请输入站点ID (如: 01)" maxlength="2">
                        <p class="mt-2 text-sm text-gray-500">输入站点ID后，继电器1、2、3将分别对应端口01、02、03</p>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- 继电器 #1 -->
                <div class="card animate-fade-in">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-xl font-bold text-gray-800">继电器 #1</h3>
                        <span class="mdi mdi-battery-charging text-3xl text-green-500"></span>
                    </div>
                    <div class="space-y-4">
                        <div class="bg-gray-100 p-2 rounded-md">
                            <p class="text-sm text-gray-700">对应端口: <span class="font-medium">01</span></p>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">温度设置</label>
                            <input type="number" id="temperature1" class="input" placeholder="设置温度">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">充电时长</label>
                            <select id="duration1" class="input">
                                <option value="1">1小时</option>
                                <option value="2">2小时</option>
                                <option value="3">3小时</option>
                                <option value="4">4小时</option>
                            </select>
                        </div>
                        <button onclick="publishMessage(1)" class="btn-primary w-full flex items-center justify-start pl-2">
                            <span class="mdi mdi-send mr-2"></span>
                            发送指令
                        </button>
                    </div>
                </div>

                <!-- 继电器 #2 -->
                <div class="card animate-fade-in delay-100">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-xl font-bold text-gray-800">继电器 #2</h3>
                        <span class="mdi mdi-battery-charging text-3xl text-green-500"></span>
                    </div>
                    <div class="space-y-4">
                        <div class="bg-gray-100 p-2 rounded-md">
                            <p class="text-sm text-gray-700">对应端口: <span class="font-medium">02</span></p>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">温度设置</label>
                            <input type="number" id="temperature2" class="input" placeholder="设置温度">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">充电时长</label>
                            <select id="duration2" class="input">
                                <option value="1">1小时</option>
                                <option value="2">2小时</option>
                                <option value="3">3小时</option>
                                <option value="4">4小时</option>
                            </select>
                        </div>
                        <button onclick="publishMessage(2)" class="btn-primary w-full flex items-center justify-start pl-2">
                            <span class="mdi mdi-send mr-2"></span>
                            发送指令
                        </button>
                    </div>
                </div>

                <!-- 继电器 #3 -->
                <div class="card animate-fade-in delay-200">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-xl font-bold text-gray-800">继电器 #3</h3>
                        <span class="mdi mdi-battery-charging text-3xl text-green-500"></span>
                    </div>
                    <div class="space-y-4">
                        <div class="bg-gray-100 p-2 rounded-md">
                            <p class="text-sm text-gray-700">对应端口: <span class="font-medium">03</span></p>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">温度设置</label>
                            <input type="number" id="temperature3" class="input" placeholder="设置温度">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">充电时长</label>
                            <select id="duration3" class="input">
                                <option value="1">1小时</option>
                                <option value="2">2小时</option>
                                <option value="3">3小时</option>
                                <option value="4">4小时</option>
                            </select>
                        </div>
                        <button onclick="publishMessage(3)" class="btn-primary w-full flex items-center justify-start pl-2">
                            <span class="mdi mdi-send mr-2"></span>
                            发送指令
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="scripts/pages/charging.js"></script>
</body>
</html>
